kind = "mobile"
previewPath = "/mobile"
title = "ZettaPoint Mobile"
version = "1.0.0"
id = "artifacts/zettapoint-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = ["/mobile"]
localPort = 8083

[services.env]
PORT = "8083"

[services.development]
run = "pnpm --filter @workspace/zettapoint-mobile run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/zettapoint-mobile", "run", "build"]
run = "pnpm --filter @workspace/zettapoint-mobile run serve"
