kind = "mobile"
previewPath = "/mobile/"
title = "ZettaPoint Mobile"
version = "1.0.0"
id = "artifacts/zettapoint-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26142

[services.development]
run = "pnpm --filter @workspace/zettapoint-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zettapoint-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/zettapoint-mobile", "run", "serve" ]

[services.env]
PORT = "26142"
BASE_PATH = "/mobile/"
